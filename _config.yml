title: "DocuQueue Blog"
description: "Professional PDF generation — templates, APIs, and the art of looking legitimate."
url: "https://docuqueue.github.io"
baseurl: "/docuqueue-blog"
author: "DocuQueue"

remote_theme: "mmistakes/minimal-mistakes@4.26.1"

skin: "default"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "single"
      author_profile: false
      share: true
      related: true
      toc: true
      read_time: true
      categories: true
      tags: true

permalink: /blog/:title/

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-feed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
